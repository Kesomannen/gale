name: Deploy Flatpak repository
run-name: Deploy Flatpak repository

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

flatter:
  name: Build Flatpak
  runs-on: ubuntu-latest
  container:
    image: ghcr.io/andyholmes/flatter/gnome:49
    options: --privileged
  strategy:
    fail-fast: false
    max-parallel: 1
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup GPG
      id: gpg
      uses: crazy-max/ghaction-import-gpg@v5
      with:
        gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
        passphrase: ${{ secrets.GPG_PASSPHRASE }}

    - name: Build and upload Flatpak bundles
      uses: andyholmes/flatter@v1
      with:
        files: |
          flatpak/com.kesomannen.gale.yml
        gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
        upload-pages-artifact: true

deploy:
  name: Deploy Flatpak
  runs-on: ubuntu-latest
  needs: flatter
  environment:
    name: github-pages
    url: ${{ steps.deployment.outputs.page_url }}

  steps:
    - name: Upload to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
