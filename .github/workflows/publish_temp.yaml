name: Publish
run-name: Publish a new version

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download 1.16.0 --repo ${{ github.repository }}

      - name: Move msi installer to bundle directory
        run: |
          mkdir -p src-tauri/target/release/bundle/msi
          mv *.msi src-tauri/target/release/bundle/msi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Thunderstore CLI
        run: dotnet tool install -g tcli

      - name: Publish to Thunderstore
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.THUNDERSTORE_TOKEN }}
        run: tcli publish --package-version 1.16.0

      - name: Update latest.json Github gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 58b4f08009e7b7b5baaea253ebccb94d
          gist_description: Auto-updater endpoint for gale
          file_path: latest.json

  flatter:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/gnome:49
      options: --privileged

    strategy:
      fail-fast: false
      max-parallel: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup GPG
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Generate CNAME
        run: |
          echo "kesomannen.com" > CNAME

      - name: Build and upload Flatpak bundles
        uses: andyholmes/flatter@main
        with:
          files: |
            flatpak/com.kesomannen.gale.yml
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          upload-pages-artifact: true

  deploy:
    name: Deploy Flatpak
    runs-on: ubuntu-latest
    needs: flatter
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Upload to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
