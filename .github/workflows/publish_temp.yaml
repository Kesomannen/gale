name: Publish
run-name: Publish a new version

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  deploy:
    name: Deploy Flatpak
    runs-on: ubuntu-latest
    needs: flatter
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Upload to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
