name: Check
run-name: Check and lint code

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  check-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Install build dependencies
        run: |
          sudo apt update;
          sudo apt-get install -y libappindicator3-dev librsvg2-dev libudev-dev patchelf \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2

      - name: Run clippy lint
        run: |
          cd src-tauri
          cargo clippy --all-targets -- -D warnings \
            -A clippy::wrong-self-convention \
            -A clippy::doc-lazy-continuation \
            -A clippy::uninlined-format-args \
            -A clippy::new-without-default

  check-macos:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add universal macOS Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build macOS app
        run: >-
          pnpm tauri build --target universal-apple-darwin --bundles app
          --config '{"bundle":{"createUpdaterArtifacts":false}}'

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Compile locales
        run: pnpm locale:compile

      - name: Run Prettier lint
        run: pnpm lint

      - name: Run Svelte check
        run: pnpm check
