name: Publish
run-name: Publish a new version

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:
    name: Build
    outputs:
      appVersion: ${{ steps.tauri.outputs.appVersion }}
      sha256: ${{ steps.hash.outputs.sha256 }}
    strategy:
      matrix:
        include:
          - platform: ubuntu-24.04
            args: '--config ''{"bundle":{"createUpdaterArtifacts":true}}'''
          - platform: windows-latest
            args: '--bundles msi --config ''{"bundle":{"createUpdaterArtifacts":true}}'''
          - platform: macos-14
            args: '--bundles app --config ''{"bundle":{"createUpdaterArtifacts":true}}'''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt update;
          sudo apt-get install -y libappindicator3-dev librsvg2-dev libudev-dev patchelf \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2

      - name: Build Tauri app and upload artifacts
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: __VERSION__
          releaseName: '__VERSION__'
          releaseDraft: false
          args: ${{ matrix.args }}

      - name: Compute AppImage hash
        if: matrix.platform == 'ubuntu-24.04'
        id: hash
        run: |
          SHA256=$(sha256sum src-tauri/target/release/bundle/appimage/*.AppImage | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download ${{ needs.build.outputs.appVersion }} --repo ${{ github.repository }}

      - name: Move msi installer to bundle directory
        run: |
          mkdir -p src-tauri/target/release/bundle/msi
          mv *.msi src-tauri/target/release/bundle/msi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Thunderstore CLI
        run: dotnet tool install -g tcli

      - name: Publish to Thunderstore
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.THUNDERSTORE_TOKEN }}
        run: tcli publish --package-version ${{ needs.build.outputs.appVersion }}

      - name: Update latest.json Github gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 58b4f08009e7b7b5baaea253ebccb94d
          gist_description: Auto-updater endpoint for gale
          file_path: latest.json

  flatter:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/andyholmes/flatter/gnome:49
      options: --privileged

    strategy:
      fail-fast: false
      max-parallel: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup GPG
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Update AppImage checksum in manifest
        env:
          SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          sed -i "s|sha256: .*|sha256: $SHA256|" flatpak/com.kesomannen.gale.yml

      - name: Build and upload Flatpak bundles
        uses: andyholmes/flatter@main
        with:
          files: |
            flatpak/com.kesomannen.gale.yml
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          upload-pages-artifact: true

  deploy:
    name: Deploy Flatpak
    runs-on: ubuntu-latest
    needs: flatter
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Upload to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
