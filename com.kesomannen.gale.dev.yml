id: com.kesomannen.gale

runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk

command: gale
finish-args:
  # Standard steam install
  # - --filesystem=home/.local/share/Steam
  # - --filesystem=home/.steam
  # Flatpak steam install
  # - --filesystem=home/.var/app/com.valvesoftware.Steam
  # Snap steam install
  # - --filesystem=home/steam

  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak

  - --device=dri
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11

rename-desktop-file: Gale.desktop
rename-icon: gale

modules:
  - name: gale
    buildsystem: simple
    build-commands:
      - chmod +x gale.AppImage
      - ./gale.AppImage --appimage-extract

      - |
        desktop-file-edit \
          --set-icon="$FLATPAK_ID" \
          --set-key="StartupNotify" --set-value="true" \
          "squashfs-root/usr/share/applications/Gale.desktop"

      - mkdir -p "$FLATPAK_DEST"/{bin,lib,share}
      - install -Dm644 squashfs-root/usr/lib/libbz2.so.1.0 "$FLATPAK_DEST"/lib/libbz2.so.1.0
      - cp -r squashfs-root/usr/share/{applications,icons} "$FLATPAK_DEST"/share/
      - install -Dm755 squashfs-root/usr/bin/gale "$FLATPAK_DEST"/bin/gale
      - install -Dm644 com.kesomannen.gale.metainfo.xml "$FLATPAK_DEST"/share/metainfo/com.kesomannen.gale.metainfo.xml

    sources:
      - type: file
        path: com.kesomannen.gale.metainfo.xml

      - type: file
        path: src-tauri/target/release/bundle/appimage/Gale_1.13.2_amd64.AppImage
        dest-filename: gale.AppImage
